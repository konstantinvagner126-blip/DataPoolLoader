<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>DataPool Loader UI</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="/static/styles.css" rel="stylesheet">
</head>
<body>
  <div class="container-fluid py-4">
    <div class="hero-card mb-4">
      <div>
        <div class="eyebrow">DataPool Loader</div>
        <h1 class="display-6 mb-1">Управление выгрузками</h1>
        <p class="text-secondary mb-0">Выбери модуль, поправь YAML и SQL, затем запусти выгрузку прямо из браузера.</p>
      </div>
      <div class="gear-wrap" aria-hidden="true">
        <span class="gear gear-lg">⚙</span>
        <span class="gear gear-md">⚙</span>
        <span class="gear gear-sm">⚙</span>
      </div>
    </div>

    <div class="row g-4">
      <div class="col-12 col-xl-3">
        <div class="panel h-100">
          <div class="panel-title">Модули</div>
          <div id="moduleList" class="list-group module-list"></div>
        </div>
      </div>

      <div class="col-12 col-xl-9">
        <div class="panel mb-4">
          <div class="d-flex flex-wrap align-items-center justify-content-between gap-3 mb-3">
            <div>
              <div class="panel-title mb-1">Редактор модуля</div>
              <div id="selectedModuleLabel" class="text-secondary small">Модуль не выбран</div>
            </div>
            <div class="d-flex flex-wrap gap-2">
              <button id="reloadButton" class="btn btn-outline-secondary">Перезагрузить</button>
              <button id="saveButton" class="btn btn-outline-primary">Сохранить</button>
              <button id="runButton" class="btn btn-primary">Запустить</button>
            </div>
          </div>

          <ul class="nav nav-tabs mb-3" id="editorTabs" role="tablist">
            <li class="nav-item" role="presentation">
              <button class="nav-link active" data-bs-toggle="tab" data-bs-target="#configTab" type="button">application.yml</button>
            </li>
            <li class="nav-item" role="presentation">
              <button class="nav-link" data-bs-toggle="tab" data-bs-target="#sqlTab" type="button">SQL</button>
            </li>
          </ul>

          <div class="tab-content">
            <div class="tab-pane fade show active" id="configTab">
              <div id="configEditor" class="editor-frame"></div>
            </div>
            <div class="tab-pane fade" id="sqlTab">
              <div class="mb-2">
                <select id="sqlFileSelect" class="form-select"></select>
              </div>
              <div id="sqlEditor" class="editor-frame"></div>
            </div>
          </div>
        </div>

        <div class="row g-4">
          <div class="col-12 col-lg-5">
            <div class="panel h-100">
              <div class="panel-title">Текущий запуск</div>
              <div id="runSummary" class="small text-secondary">Запусков пока нет.</div>
              <div id="sourceProgress" class="mt-3 small"></div>
            </div>
          </div>
          <div class="col-12 col-lg-7">
            <div class="panel h-100">
              <div class="panel-title">События</div>
              <div id="eventLog" class="event-log"></div>
            </div>
          </div>
        </div>

        <div class="panel mt-4">
          <div class="panel-title">Summary</div>
          <pre id="summaryJson" class="summary-box">Пока нет данных summary.</pre>
        </div>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/js/bootstrap.bundle.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/monaco-editor/0.52.2/min/vs/loader.min.js"></script>
  <script src="/static/app.js"></script>
</body>
</html>
