<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>SQL Console Modernization Mockups</title>
  <style>
    :root {
      --bg: #eef2f5;
      --surface: #ffffff;
      --surface-soft: #f7f9fb;
      --line: #d7dee7;
      --line-strong: #aebbcc;
      --text: #172033;
      --muted: #647287;
      --muted-2: #8a96a8;
      --accent: #246bfe;
      --accent-soft: #e8f0ff;
      --green: #0f9f6e;
      --green-soft: #e7f8f1;
      --amber: #b87900;
      --amber-soft: #fff4d8;
      --red: #d63f3f;
      --red-soft: #fff0f0;
      --mono: "SFMono-Regular", "JetBrains Mono", "Fira Code", ui-monospace, monospace;
      --sans: "Inter", "Segoe UI", system-ui, sans-serif;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      background: var(--bg);
      color: var(--text);
      font-family: var(--sans);
      font-size: 14px;
      letter-spacing: 0;
    }

    .review-shell {
      width: 1440px;
      margin: 0 auto;
    }

    .review-nav {
      position: sticky;
      top: 0;
      z-index: 20;
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      gap: 16px;
      align-items: center;
      padding: 10px 18px;
      border-bottom: 1px solid var(--line);
      background: rgba(238, 242, 245, 0.96);
      backdrop-filter: blur(10px);
    }

    .review-title {
      font-size: 12px;
      font-weight: 760;
      text-transform: uppercase;
      color: #43536a;
    }

    .review-note {
      margin-top: 3px;
      color: var(--muted);
      font-size: 12px;
    }

    .review-links {
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .review-link {
      display: inline-flex;
      align-items: center;
      min-height: 30px;
      padding: 7px 10px;
      border: 1px solid var(--line);
      border-radius: 6px;
      background: var(--surface);
      color: #334257;
      font-size: 12px;
      font-weight: 720;
      text-decoration: none;
    }

    .review-link.active {
      border-color: #1b2434;
      background: #1b2434;
      color: #fff;
    }

    .screen {
      width: 1440px;
      min-height: 960px;
      padding: 18px;
      background:
        linear-gradient(180deg, rgba(255,255,255,0.75), rgba(238,242,245,0.92)),
        var(--bg);
    }

    .tool-header {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      gap: 16px;
      align-items: center;
      margin-bottom: 12px;
      padding: 13px 14px;
      border: 1px solid var(--line);
      border-radius: 12px;
      background:
        linear-gradient(135deg, rgba(255,255,255,0.98), rgba(247,249,252,0.98)),
        var(--surface);
      box-shadow: 0 10px 28px rgba(23, 32, 51, 0.06);
    }

    .tool-identity {
      display: grid;
      grid-template-columns: auto minmax(0, 1fr);
      gap: 12px;
      align-items: center;
      min-width: 0;
    }

    .tool-icon {
      width: 58px;
      height: 58px;
      border-radius: 16px;
      display: grid;
      place-items: center;
      background:
        radial-gradient(circle at 28% 18%, rgba(255,255,255,0.45), transparent 34%),
        linear-gradient(145deg, #102033 0%, #1b64f2 58%, #12b886 100%);
      box-shadow:
        inset 0 1px 0 rgba(255,255,255,0.25),
        0 12px 26px rgba(24, 79, 184, 0.24);
    }

    .tool-icon svg {
      width: 42px;
      height: 42px;
      overflow: visible;
    }

    .tool-copy {
      min-width: 0;
    }

    .tool-header .crumbs {
      margin-bottom: 7px;
    }

    .tool-header .crumb {
      padding: 6px 9px;
      font-size: 12px;
    }

    .tool-title-line {
      display: flex;
      align-items: center;
      gap: 10px;
      min-width: 0;
    }

    .tool-title-line h1 {
      font-size: 24px;
      letter-spacing: -0.02em;
    }

    .tool-header .subtitle {
      max-width: 860px;
      margin-top: 4px;
      overflow: hidden;
      color: var(--muted);
      font-size: 13px;
      line-height: 1.35;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .crumbs {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 8px;
    }

    .crumb,
    .tab,
    .btn,
    .icon-btn,
    .select-like,
    .chip {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      border: 1px solid var(--line);
      border-radius: 6px;
      background: var(--surface);
      color: var(--text);
      font-size: 13px;
      line-height: 1;
      white-space: nowrap;
    }

    .crumb,
    .tab {
      padding: 7px 10px;
    }

    .crumb.active,
    .tab.active,
    .btn.primary {
      border-color: #1b2434;
      background: #1b2434;
      color: #fff;
    }

    .title-row {
      display: flex;
      align-items: baseline;
      gap: 12px;
    }

    h1,
    h2,
    h3,
    p {
      margin: 0;
    }

    h1 {
      font-size: 24px;
      font-weight: 720;
      letter-spacing: 0;
    }

    .subtitle {
      margin-top: 5px;
      color: var(--muted);
      font-size: 13px;
    }

    .header-status {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .chip {
      padding: 7px 9px;
      color: var(--muted);
      background: var(--surface-soft);
    }

    .chip.ok {
      border-color: #b9e8d5;
      background: var(--green-soft);
      color: #116247;
    }

    .chip.warn {
      border-color: #f1d28a;
      background: var(--amber-soft);
      color: #7a4e00;
    }

    .dot {
      width: 7px;
      height: 7px;
      border-radius: 999px;
      background: var(--muted-2);
    }

    .dot.ok {
      background: var(--green);
    }

    .dot.warn {
      background: #f2a51a;
    }

    .sql-shell {
      display: grid;
      grid-template-columns: 286px minmax(0, 1fr) 252px;
      gap: 12px;
      align-items: start;
    }

    .sql-shell.wide {
      grid-template-columns: 310px minmax(0, 1fr);
    }

    .pane {
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--surface);
      overflow: hidden;
    }

    .pane-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      min-height: 42px;
      padding: 9px 11px;
      border-bottom: 1px solid var(--line);
      background: #f5f7fa;
    }

    .pane-title {
      font-size: 12px;
      font-weight: 760;
      text-transform: uppercase;
      color: #43536a;
    }

    .pane-subtitle {
      font-size: 12px;
      color: var(--muted);
    }

    .pane-body {
      padding: 10px;
    }

    .source-toolbar {
      display: grid;
      gap: 8px;
      margin-bottom: 10px;
    }

    .credentials-card {
      display: grid;
      gap: 8px;
      margin-bottom: 10px;
      padding: 9px;
      border: 1px solid #c8d7ee;
      border-radius: 8px;
      background:
        linear-gradient(135deg, rgba(232, 240, 255, 0.82), rgba(255,255,255,0.96)),
        #fff;
    }

    .credentials-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      font-size: 12px;
    }

    .file-pill {
      overflow: hidden;
      padding: 7px 8px;
      border: 1px solid #dce5f2;
      border-radius: 6px;
      background: #fff;
      color: #31435a;
      font-family: var(--mono);
      font-size: 11px;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .credentials-actions {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 6px;
    }

    .input,
    .select-like {
      min-height: 32px;
      padding: 8px 9px;
      border: 1px solid var(--line);
      border-radius: 6px;
      background: #fff;
      color: var(--text);
    }

    .source-tree {
      display: grid;
      gap: 2px;
      font-size: 13px;
    }

    .tree-group,
    .tree-source {
      display: grid;
      grid-template-columns: auto 1fr auto;
      align-items: center;
      gap: 8px;
      min-height: 30px;
      padding: 5px 7px;
      border-radius: 5px;
    }

    .tree-group {
      margin-top: 6px;
      background: #f6f8fb;
      font-weight: 720;
    }

    .tree-source {
      margin-left: 16px;
      color: #27364c;
    }

    .tree-source.selected,
    .tree-group.selected {
      background: var(--accent-soft);
      color: #123d8c;
    }

    .count {
      min-width: 20px;
      padding: 3px 6px;
      border-radius: 999px;
      background: #e5ebf3;
      color: #43536a;
      text-align: center;
      font-size: 11px;
      font-weight: 720;
    }

    .main-workspace {
      display: grid;
      gap: 10px;
    }

    .editor-frame {
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--surface);
      overflow: hidden;
    }

    .editor-topline {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      padding: 8px 10px;
      border-bottom: 1px solid var(--line);
      background: #f5f7fa;
    }

    .toolbar {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 6px;
    }

    .btn,
    .icon-btn {
      min-height: 30px;
      padding: 7px 10px;
      font-weight: 620;
    }

    .icon-btn {
      justify-content: center;
      min-width: 32px;
      padding: 7px;
    }

    .btn.ghost,
    .icon-btn.ghost {
      background: #f8fafc;
      color: #42546b;
    }

    .btn:disabled {
      cursor: not-allowed;
      opacity: 0.48;
    }

    .btn.danger {
      border-color: #e9b9b9;
      background: var(--red-soft);
      color: #9b2727;
    }

    .btn.success {
      border-color: #b9e8d5;
      background: var(--green-soft);
      color: #116247;
    }

    .code {
      display: grid;
      grid-template-columns: 42px 1fr;
      min-height: 292px;
      font-family: var(--mono);
      font-size: 13px;
      line-height: 1.65;
      background: #fbfcfe;
    }

    .line-numbers {
      padding: 12px 8px;
      border-right: 1px solid #e4e9f0;
      color: #94a0b3;
      text-align: right;
      user-select: none;
    }

    .code-lines {
      padding: 12px 14px;
      color: #14243a;
      white-space: pre-wrap;
    }

    .kw { color: #175cd3; font-weight: 720; }
    .fn { color: #7c3aed; }
    .str { color: #0f8f61; }
    .num { color: #b45309; }
    .comment { color: #7e8ca1; }

    .result-pane {
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--surface);
      overflow: hidden;
    }

    .result-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      padding: 8px 10px;
      border-bottom: 1px solid var(--line);
      background: #f5f7fa;
    }

    .result-head-main {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      min-width: 0;
      flex: 1;
    }

    .result-actions {
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .tabs {
      display: flex;
      align-items: center;
      gap: 4px;
    }

    .tab {
      padding: 7px 10px;
      font-size: 12px;
      font-weight: 700;
      text-decoration: none;
    }

    .status-line {
      display: grid;
      grid-template-columns: repeat(5, auto) minmax(0, 1fr);
      gap: 6px;
      align-items: center;
      padding: 8px 10px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #f7f9fb;
    }

    .status-line .chip {
      font-size: 12px;
      padding: 6px 8px;
    }

    .result-empty {
      display: flex;
      align-items: center;
      min-height: 96px;
      padding: 14px;
      color: var(--muted);
      background: #fbfcfe;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 13px;
    }

    th,
    td {
      padding: 8px 9px;
      border-bottom: 1px solid #e5ebf3;
      text-align: left;
    }

    th {
      background: #eef3f8;
      color: #54657a;
      font-size: 11px;
      text-transform: uppercase;
    }

    td.mono {
      font-family: var(--mono);
      color: #26364c;
    }

    .result-meta {
      display: flex;
      gap: 6px;
      align-items: center;
    }

    .source-summary {
      display: grid;
      grid-template-columns: repeat(5, minmax(0, 1fr));
      gap: 6px;
      padding: 8px 10px;
      border-bottom: 1px solid var(--line);
      background: #fbfcfe;
    }

    .source-summary .compact-row {
      min-height: 28px;
      padding: 5px 7px;
    }

    .result-mode-note {
      padding: 8px 10px;
      border-bottom: 1px solid var(--line);
      background: #fbfcfe;
      color: var(--muted);
      font-size: 12px;
    }

    .result-grid-toolbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      padding: 8px 10px;
      border-bottom: 1px solid var(--line);
      background: #ffffff;
    }

    .result-grid-toolbar-actions {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
    }

    .result-grid-note {
      color: var(--muted);
      font-size: 12px;
    }

    .grid-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
    }

    .grid-header-actions {
      display: inline-flex;
      gap: 3px;
      color: #6d7d91;
      font-size: 10px;
      text-transform: none;
    }

    .grid-row-head {
      width: 54px;
      color: var(--muted);
      font-family: var(--mono);
    }

    .grid-cell-active {
      outline: 2px solid #9fc0ff;
      outline-offset: -2px;
      background: var(--accent-soft);
    }

    .split-view {
      display: grid;
      grid-template-columns: 210px minmax(0, 1fr);
      min-height: 260px;
    }

    .source-picker {
      display: grid;
      align-content: start;
      gap: 5px;
      padding: 10px;
      border-right: 1px solid var(--line);
      background: #fbfcfe;
    }

    .source-picker .compact-row.active {
      border-color: #9fc0ff;
      background: var(--accent-soft);
      color: #123d8c;
    }

    .split-table {
      min-width: 0;
    }

    .diff-summary {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 8px;
      padding: 10px;
      border-bottom: 1px solid var(--line);
      background: #fbfcfe;
    }

    .diff-card {
      padding: 9px;
      border: 1px solid var(--line);
      border-radius: 7px;
      background: #fff;
    }

    .diff-card.warn {
      border-color: #f1d28a;
      background: var(--amber-soft);
    }

    .right-rail {
      display: grid;
      gap: 10px;
    }

    .compact-list {
      display: grid;
      gap: 5px;
    }

    .compact-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      min-height: 30px;
      padding: 6px 7px;
      border: 1px solid #e5ebf3;
      border-radius: 6px;
      background: #fbfcfe;
      font-size: 12px;
    }

    .compact-row strong {
      font-size: 12px;
    }

    .hint {
      color: var(--muted);
      font-size: 12px;
      line-height: 1.45;
    }

    .safety-strip {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      padding: 9px 10px;
      border: 1px solid #f1d28a;
      border-radius: 8px;
      background: var(--amber-soft);
      color: #624200;
    }

    .object-shell,
    .history-shell,
    .settings-shell {
      display: grid;
      grid-template-columns: 360px minmax(0, 1fr);
      gap: 12px;
      align-items: start;
    }

    .object-list {
      display: grid;
      gap: 4px;
      margin-top: 10px;
    }

    .object-row {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 8px;
      padding: 8px;
      border: 1px solid var(--line);
      border-radius: 6px;
      background: #fbfcfe;
    }

    .object-row.active {
      border-color: #9fc0ff;
      background: var(--accent-soft);
    }

    .inspector-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 8px;
      margin-bottom: 12px;
    }

    .metric {
      padding: 9px;
      border: 1px solid var(--line);
      border-radius: 7px;
      background: #fbfcfe;
    }

    .metric-label {
      margin-bottom: 4px;
      color: var(--muted);
      font-size: 11px;
      text-transform: uppercase;
    }

    .metric-value {
      font-weight: 720;
    }

    .history-shell {
      grid-template-columns: 290px minmax(0, 1fr);
    }

    .settings-shell {
      grid-template-columns: 330px minmax(0, 1fr) 300px;
    }

    .settings-side {
      display: grid;
      gap: 12px;
      align-content: start;
    }

    .settings-form {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 10px;
    }

    .settings-form .wide {
      grid-column: 1 / -1;
    }

    .mode-switch {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 6px;
      padding: 4px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #eef2f7;
    }

    .mode-option {
      padding: 8px;
      border: 1px solid transparent;
      border-radius: 6px;
      color: var(--muted);
      font-size: 12px;
      font-weight: 720;
      text-align: center;
      text-decoration: none;
    }

    .mode-option.active {
      border-color: #b9c8dd;
      background: #ffffff;
      color: var(--ink);
      box-shadow: 0 5px 14px rgba(24, 36, 56, 0.08);
    }

    .field {
      display: grid;
      gap: 5px;
    }

    .field label {
      color: var(--muted);
      font-size: 11px;
      font-weight: 720;
      text-transform: uppercase;
    }

    .field .input {
      min-height: 34px;
      font-family: var(--mono);
      font-size: 12px;
    }

    .danger-zone {
      margin-top: 10px;
      padding: 9px;
      border: 1px solid #e9b9b9;
      border-radius: 7px;
      background: var(--red-soft);
    }

    .filter-stack {
      display: grid;
      gap: 8px;
    }

    .history-row td {
      vertical-align: top;
    }

    .badge {
      display: inline-flex;
      align-items: center;
      padding: 3px 7px;
      border-radius: 999px;
      font-size: 11px;
      font-weight: 720;
      background: #e8edf5;
      color: #43536a;
    }

    .badge.ok {
      background: var(--green-soft);
      color: #116247;
    }

    .badge.warn {
      background: var(--amber-soft);
      color: #7a4e00;
    }

    .badge.fail {
      background: var(--red-soft);
      color: #9b2727;
    }
  </style>
</head>
<body>
  <main id="root"></main>
  <script>
    const screens = {
      workspace: renderWorkspace,
      result: renderResult,
      transaction: renderTransaction,
      objects: renderObjects,
      sources: renderSourceSettings,
      history: renderHistory
    };

    const params = new URLSearchParams(location.search);
    const screen = params.get("screen") || "workspace";
    const resultView = params.get("view") || "combined";
    const sourceCredentialsMode = ["keychain", "placeholders"].includes(params.get("credentials"))
      ? params.get("credentials")
      : "keychain";
    document.getElementById("root").innerHTML = reviewShell(screen, (screens[screen] || renderWorkspace)());

    function reviewShell(activeScreen, content) {
      const links = [
        ["workspace", "Workspace"],
        ["result", "Результаты"],
        ["transaction", "Транзакция"],
        ["objects", "Инспектор"],
        ["sources", "Источники"],
        ["history", "История"]
      ];
      return `
        <div class="review-shell">
          <nav class="review-nav" aria-label="SQL console design review navigation">
            <div>
              <div class="review-title">SQL console design review · backlog 18.1</div>
              <div class="review-note">Standalone HTML для согласования. Product UI не изменен.</div>
            </div>
            <div class="review-links">
              ${links.map(([id, label]) => `<a class="review-link ${activeScreen === id ? "active" : ""}" href="?screen=${id}">${label}</a>`).join("")}
            </div>
          </nav>
          ${content}
        </div>
      `;
    }

    function header(title, subtitle, extra = "") {
      return `
        <section class="tool-header">
          <div class="tool-identity">
            ${sqlToolIcon()}
            <div class="tool-copy">
              <div class="crumbs">
                <span class="crumb">На главную</span>
                <span class="crumb">Объекты БД</span>
                <span class="crumb active">SQL-консоль</span>

              <div class="compact-row"><strong>db3</strong><span class="badge warn">warning</span></div>
              <div class="compact-row"><strong>db4</strong><span class="badge">not checked</span></div>
              <div class="compact-row"><strong>db5</strong><span class="badge fail">failed</span></div>
            </div>
          </section>
          <section class="pane">
            <div class="pane-header">
              <div><div class="pane-title">Редактирование source</div><div class="pane-subtitle">db3</div></div>
              <div class="toolbar"><button class="btn ghost">Тест подключения</button><button class="btn primary">Сохранить</button></div>
            </div>
            <div class="pane-body">
              <div class="settings-form">
                <div class="field"><label>name</label><div class="input">db3</div></div>
                <div class="field"><label>driver</label><div class="input">PostgreSQL / JDBC</div></div>
                <div class="field wide">
                  <label>credentials mode</label>
                  ${sourceCredentialsModeSwitch(sourceCredentialsMode)}
                </div>
                ${renderSourceCredentialFields(sourceCredentialsMode)}
                <div class="field wide"><label>Комментарий</label><div class="input">IFT shard for payment checks</div></div>
              </div>
              ${renderSourceTechnicalDetails(sourceCredentialsMode)}
              <div class="result-mode-note" style="margin-top:10px;border:1px solid var(--line);border-radius:7px">
                Последний тест: <strong>OK</strong>, 38 ms, PostgreSQL 15.3.
              </div>
              <div class="danger-zone">
                <div class="credentials-head"><strong>Удаление source</strong><span class="badge warn">2 groups reference this source</span></div>
                <div class="hint" style="margin-top:5px">Удаление должно проверить группы и выбранные workspace sources до записи конфига.</div>
              </div>
            </div>
          </section>
          <div class="settings-side">
            <section class="pane">
              <div class="pane-header">
                <div><div class="pane-title">credential.properties</div><div class="pane-subtitle">ui.defaultCredentialsFile</div></div>
                <div class="toolbar"><button class="btn ghost">Выбрать файл</button><button class="btn ghost">Проверить</button></div>
              </div>
              <div class="pane-body">
                <div class="file-pill">~/DataPoolLoader/credential.properties</div>
                <div class="compact-list" style="margin-top:10px">
                  <div class="compact-row"><strong>file</strong><span class="badge ok">loaded</span></div>
                  <div class="compact-row"><strong>PAYMENTS_DB_JDBC_URL</strong><span class="badge ok">resolved</span></div>
                  <div class="compact-row"><strong>PAYMENTS_DB_USERNAME</strong><span class="badge ok">resolved</span></div>
                  <div class="compact-row"><strong>PAYMENTS_DB_PASSWORD</strong><span class="badge warn">missing</span></div>
                </div>
              </div>
            </section>
            <section class="pane">
              <div class="pane-header"><div><div class="pane-title">Groups</div><div class="pane-subtitle">sourceGroups</div></div><button class="btn ghost">+ Group</button></div>
              <div class="pane-body compact-list">
                <div class="compact-row"><strong>dev</strong><span class="hint">db1, db2</span></div>
                <div class="compact-row"><strong>ift</strong><span class="hint">db2, db3, db4</span></div>
                <div class="compact-row"><strong>lt</strong><span class="hint">db4, db5</span></div>
              </div>
            </section>
          </div>
        </div>
      </div>`;
    }

    function renderHistory() {
      return `<div class="screen">
        ${header("История запусков SQL", "Отдельный экран истории остается плотным журналом, не частью основного workspace.")}
        <div class="history-shell">
          <section class="pane">
            <div class="pane-header"><div class="pane-title">Фильтры</div></div>
            <div class="pane-body filter-stack">
              <div class="input">workspace: current</div>
              <div class="input">status: all</div>
              <div class="input">source: any</div>
              <button class="btn ghost">Сбросить</button>
            </div>
          </section>
          <section class="pane">
            <div class="pane-header">
              <div><div class="pane-title">Execution log</div><div class="pane-subtitle">последние 50 запусков</div></div>
              <button class="btn ghost">Обновить</button>
            </div>
            <table>
              <thead><tr><th>time</th><th>status</th><th>duration</th><th>sources</th><th>transaction</th><th>sql</th><th>actions</th></tr></thead>
              <tbody>
                <tr class="history-row"><td class="mono">18:24:03</td><td><span class="badge ok">DONE</span></td><td>42 ms</td><td>5</td><td>autocommit</td><td class="mono">select customer_id, status...</td><td><button class="btn ghost">Подставить</button></td></tr>
                <tr class="history-row"><td class="mono">18:19:44</td><td><span class="badge warn">ROLLBACK</span></td><td>1.2 s</td><td>3</td><td>manual</td><td class="mono">update orders.payment_event...</td><td><button class="btn ghost">Повторить</button></td></tr>
                <tr class="history-row"><td class="mono">18:10:11</td><td><span class="badge fail">FAILED</span></td><td>88 ms</td><td>1</td><td>autocommit</td><td class="mono">select * from missing_table</td><td><button class="btn ghost">Подставить</button></td></tr>
                <tr class="history-row"><td class="mono">17:58:02</td><td><span class="badge ok">DONE</span></td><td>9 ms</td><td>5</td><td>autocommit</td><td class="mono">select 1 as check_value</td><td><button class="btn ghost">Повторить</button></td></tr>
              </tbody>
            </table>
          </section>
        </div>
      </div>`;
    }
  </script>
</body>
</html>
