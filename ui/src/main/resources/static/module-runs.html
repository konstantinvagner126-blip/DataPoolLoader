<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>DataPool Loader UI — история и результаты</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="/static/styles.css?v=20260417r" rel="stylesheet">
</head>
<body>
  <div class="container-fluid py-4">
    <div class="hero-card mb-4">
      <div>
        <div class="eyebrow" id="runsPageEyebrow">История запусков</div>
        <h1 class="display-6 mb-1">История и результаты</h1>
        <p id="runsPageSubtitle" class="text-secondary mb-0">Здесь собраны история запусков, итоговые результаты и подробности выполнения выбранного модуля.</p>
      </div>
      <div class="hero-art" aria-hidden="true">
        <div class="flow-stage">
          <div class="source-node source-node-1">RUN</div>
          <div class="source-node source-node-2">LOG</div>
          <div class="source-node source-node-3">CSV</div>
          <div class="source-node source-node-4">JSON</div>
          <div class="source-node source-node-5">DB</div>

          <div class="flow-line flow-line-1"><span class="flow-dot dot-1"></span></div>
          <div class="flow-line flow-line-2"><span class="flow-dot dot-2"></span></div>
          <div class="flow-line flow-line-3"><span class="flow-dot dot-3"></span></div>
          <div class="flow-line flow-line-4"><span class="flow-dot dot-4"></span></div>
          <div class="flow-line flow-line-5"><span class="flow-dot dot-5"></span></div>

          <div class="merge-hub">
            <div class="merge-title">RESULTS</div>
          </div>
        </div>
      </div>
    </div>

    <div class="panel mb-4">
      <div class="d-flex flex-wrap align-items-start justify-content-between gap-3">
        <div>
          <div id="runsPageModuleTitle" class="panel-title mb-1">Модуль не выбран</div>
          <div id="runsPageModuleMeta" class="text-secondary small">Открой этот экран из карточки выбранного модуля.</div>
        </div>
        <div class="d-flex flex-wrap gap-2">
          <a id="backToModuleButton" class="btn btn-outline-dark" href="/">Вернуться к модулю</a>
        </div>
      </div>
      <div id="runsPageAlert" class="alert alert-warning d-none mt-3 mb-0"></div>
    </div>

    <div id="executionLogPanelHost"></div>
    <div id="historyCurrentPanelHost"></div>
    <div id="technicalDiagnosticsPanelHost"></div>
    <div id="summaryPanelHost"></div>
    <div id="sourceResultsPanelHost"></div>
    <div id="artifactsPanelHost"></div>

    <footer class="footer-note text-center mt-4">
      Разработано командой MLP
    </footer>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/js/bootstrap.bundle.min.js"></script>
  <script src="/static/js/common/dom.js?v=20260417q"></script>
  <script src="/static/js/common/http.js?v=20260328m"></script>
  <script src="/static/js/common/run-progress.js?v=20260417r"></script>
  <script src="/static/js/common/blocks/editor-panels.js?v=20260417i"></script>
  <script src="/static/js/db/modules/formatters.js?v=20260417o"></script>
  <script src="/static/js/module-runs/renderer.js?v=20260417s"></script>
  <script src="/static/js/module-runs/page.js?v=20260417s"></script>
</body>
</html>
