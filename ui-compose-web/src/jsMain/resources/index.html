<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Compose UI</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="./styles.css?v=20260418a">
  <link rel="stylesheet" href="./compose-ui.css">
</head>
<body>
  <div id="root"></div>
  <script>
    (function () {
      function ensureOverlay() {
        var existing = document.getElementById("compose-ui-error-overlay");
        if (existing) return existing;
        var overlay = document.createElement("div");
        overlay.id = "compose-ui-error-overlay";
        overlay.style.position = "fixed";
        overlay.style.right = "16px";
        overlay.style.bottom = "16px";
        overlay.style.maxWidth = "640px";
        overlay.style.padding = "12px 14px";
        overlay.style.background = "rgba(120, 20, 20, 0.96)";
        overlay.style.color = "#fff";
        overlay.style.font = "12px/1.45 Menlo, Monaco, monospace";
        overlay.style.borderRadius = "10px";
        overlay.style.boxShadow = "0 12px 28px rgba(0,0,0,.35)";
        overlay.style.zIndex = "2147483647";
        overlay.style.whiteSpace = "pre-wrap";
        overlay.style.display = "none";
        document.body.appendChild(overlay);
        return overlay;
      }

      function showComposeUiError(prefix, message) {
        var overlay = ensureOverlay();
        overlay.style.display = "block";
        overlay.textContent = prefix + ": " + message;
      }

      window.addEventListener("error", function (event) {
        showComposeUiError("JS error", event.message || "Unknown error");
      });

      window.addEventListener("unhandledrejection", function (event) {
        var reason = event.reason;
        var message = reason && (reason.message || String(reason)) || "Unknown rejection";
        var normalized = String(message || "").trim();
        if (normalized === "Canceled" || normalized === "AbortError") {
          return;
        }
        showComposeUiError("Promise rejection", message);
      });
    })();
  </script>
  <script src="./compose-ui-web.js"></script>
</body>
</html>
