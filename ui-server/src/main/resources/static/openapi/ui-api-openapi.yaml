openapi: 3.1.0
info:
  title: DataPool Loader UI API
  version: "2026-04-17"
  description: |
    Полноценная OpenAPI-спецификация серверной части UI.

    В спецификации описаны HTTP endpoint-ы, которые использует фронтенд UI:
    файловые модули, DB-модули, импорт в registry, визуальная форма конфига,
    запуски, credential.properties и SQL-консоль.

    Общий формат ошибки для большинства endpoint-ов:

      { "error": "Текст ошибки" }

servers:
  - url: /
    description: Текущий UI server

tags:
  - name: Runtime
    description: Runtime-контекст UI и переключение режима работы.
  - name: Files Modules
    description: Каталог и редактор файловых модулей.
  - name: Unified Run History
    description: Единый экран истории и результатов для режимов Files и Database.
  - name: DB Modules
    description: Каталог, редактор, личный черновик и запуск DB-модулей.
  - name: DB Sync
    description: Импорт файловых модулей в registry PostgreSQL.
  - name: Config Form
    description: Визуальная форма поверх application.yml.
  - name: Files Runs
    description: Запуск файловых модулей и текущее состояние UI.
  - name: Credentials
    description: Работа с credential.properties.
  - name: SQL Console
    description: SQL-консоль и асинхронные запросы по shard-источникам.
  - name: WebSocket
    description: Live-обновления файлового режима.

paths:
  /api/ui/runtime-context:
    get:
      tags: [Runtime]
      summary: Текущий runtime-контекст UI
      description: |
        Возвращает requested/effective mode, состояние DB-подключения,
        данные actor и причину возврата в файловый режим, если она есть.
      operationId: getRuntimeContext
      responses:
        "200":
          description: Runtime-контекст UI
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UiRuntimeContext"
              example:
                requestedMode: database
                effectiveMode: files
                fallbackReason: "Режим базы данных недоступен, интерфейс переключен в файловый режим."
                actor:
                  resolved: true
                  actorId: kwdev
                  actorSource: OS_LOGIN
                  actorDisplayName: kwdev
                  requiresManualInput: false
                  message: "Пользователь ОС определен автоматически."
                database:
                  configured: true
                  available: false
                  schema: ui_registry
                  message: "Параметры подключения к базе данных содержат неразрешенные placeholders."
                  errorMessage: "Не удалось разрешить placeholders для полей: jdbcUrl, username, password."

  /api/ui/runtime-mode:
    post:
      tags: [Runtime]
      summary: Сохранение предпочитаемого режима UI
      description: Сохраняет пользовательское предпочтение Files/Database и сразу возвращает пересчитанный runtime-контекст.
      operationId: updateRuntimeMode
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UiRuntimeModeUpdateRequest"
            examples:
              files:
                value:
                  mode: files
              database:
                value:
                  mode: database
      responses:
        "200":
          description: Новый предпочитаемый режим сохранен
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UiRuntimeModeUpdateResponse"
              example:
                message: "Предпочитаемый режим UI сохранен: database."
                runtimeContext:
                  requestedMode: database
                  effectiveMode: database
                  fallbackReason: null
                  actor:
                    resolved: true
                    actorId: kwdev
                    actorSource: OS_LOGIN
                    actorDisplayName: kwdev
                    requiresManualInput: false
                    message: "Пользователь ОС определен автоматически."
                  database:
                    configured: true
                    available: true
                    schema: ui_registry
                    message: "Подключение к базе данных доступно."
        "400":
          $ref: "#/components/responses/ErrorResponse"

  /api/modules:
    get:
      tags: [Files Modules]
      summary: Упрощенный список файловых модулей
      operationId: listFileModules
      responses:
        "200":
          description: Список файловых модулей
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ModuleCatalogItemResponse"
              example:
                - id: local-manual-test
                  title: local-manual-test
                  description: "Локальный модуль для ручной проверки"
                  tags: ["local", "manual"]
                  validationStatus: VALID
                  validationIssues: []

  /api/modules/catalog:
    get:
      tags: [Files Modules]
      summary: Расширенный каталог файловых модулей
      description: Возвращает каталог модулей вместе со статусом appsRoot и валидацией каждого модуля.
      operationId: getFileModulesCatalog
      responses:
        "200":
          description: Каталог файловых модулей
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ModulesCatalogResponse"
              example:
                appsRootStatus:
                  mode: READY
                  configuredPath: "/Users/kwdev/DataPoolLoader/apps"
                  message: "Каталог apps найден и готов к работе."
                modules:
                  - id: local-manual-test
                    title: local-manual-test
                    description: "Локальный модуль для ручной проверки"
                    tags: ["local", "manual"]
                    validationStatus: VALID
                    validationIssues: []

  /api/modules/{id}:
    get:
      tags: [Files Modules]
      summary: Детали файлового модуля
      operationId: loadFileModule
      parameters:
        - $ref: "#/components/parameters/ModuleIdPath"
      responses:
        "200":
          description: Содержимое application.yml, SQL-ресурсов и метаданные модуля
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ModuleEditorSessionResponse"
              example:
                storageMode: FILES
                module:
                  id: local-manual-test
                  title: local-manual-test
                  description: "Локальный модуль для ручной проверки"
                  tags: ["local", "manual"]
                  validationStatus: VALID
                  validationIssues: []
                  configPath: "/Users/kwdev/DataPoolLoader/apps/local-manual-test/src/main/resources/application.yml"
                  configText: "app:\n  outputDir: ./output\n  sources:\n    - name: db1\n      jdbcUrl: ${DB1_JDBC_URL}\n"
                  sqlFiles:
                    - label: "Источник: db1"
                      path: "classpath:sql/source1.sql"
                      content: "select * from test_table"
                      exists: true
                  requiresCredentials: false
                  credentialsStatus:
                    mode: NONE
                    displayName: "Файл не задан"
                    fileAvailable: false
                    uploaded: false
                  requiredCredentialKeys: []
                  missingCredentialKeys: []
                  credentialsReady: true
                capabilities:
                  save: true
                  saveWorkingCopy: false
                  discardWorkingCopy: false
                  publish: false
                  run: true
                  createModule: false
                  deleteModule: false
                sourceKind: FILES
        "400":
          $ref: "#/components/responses/ErrorResponse"

  /api/modules/{id}/save:
    post:
      tags: [Files Modules]
      summary: Сохранение файлового модуля
      description: Сохраняет application.yml и все SQL-ресурсы файлового модуля.
      operationId: saveFileModule
      parameters:
        - $ref: "#/components/parameters/ModuleIdPath"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SaveModuleRequest"
            example:
              configText: "app:\n  outputDir: ./output\n  mergeMode: plain\n"
              sqlFiles:
                "classpath:sql/source1.sql": "select * from test_table"
      responses:
        "200":
          description: Изменения сохранены
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SaveResultResponse"
              example:
                message: "Изменения модуля сохранены."
        "400":
          $ref: "#/components/responses/ErrorResponse"

  /api/module-runs/{storage}/{id}:
    get:
      tags: [Unified Run History]
      summary: Session общего экрана истории и результатов
      description: Возвращает данные заголовка и capability для экрана `/module-runs`.
      operationId: getModuleRunSession
      parameters:
        - $ref: "#/components/parameters/StoragePath"
        - $ref: "#/components/parameters/ModuleIdPath"
      responses:
        "200":
          description: Session общего экрана истории
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ModuleRunPageSessionResponse"
              example:
                storageMode: FILES
                moduleId: local-manual-test
                moduleTitle: local-manual-test
                moduleMeta: "/Users/kwdev/DataPoolLoader/apps/local-manual-test/src/main/resources/application.yml · режим хранения: Файлы"
        "400":
          $ref: "#/components/responses/ErrorResponse"

  /api/module-runs/{storage}/{id}/runs:
    get:
      tags: [Unified Run History]
      summary: История запусков для общего экрана
      operationId: listModuleRunsUnified
      parameters:
        - $ref: "#/components/parameters/StoragePath"
        - $ref: "#/components/parameters/ModuleIdPath"
        - $ref: "#/components/parameters/LimitQuery"
      responses:
        "200":
          description: Список запусков
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ModuleRunHistoryResponse"
              example:
                storageMode: FILES
                moduleId: local-manual-test
                activeRunId: null
                uiSettings:
                  showTechnicalDiagnostics: false
                  showRawSummaryJson: false
                runs:
                  - runId: "run-20260417-001"
                    moduleId: local-manual-test
                    moduleTitle: local-manual-test
                    status: SUCCESS
                    startedAt: "2026-04-17T10:15:00Z"
                    finishedAt: "2026-04-17T10:16:05Z"
                    mergedRowCount: 1700
                    targetStatus: SUCCESS
                    successfulSourceCount: 2
                    failedSourceCount: 0
                    skippedSourceCount: 0
                  - runId: "run-20260417-000"
                    moduleId: local-manual-test
                    moduleTitle: local-manual-test
                    status: FAILED
                    startedAt: "2026-04-17T09:55:00Z"
                    finishedAt: "2026-04-17T09:55:20Z"
                    mergedRowCount: 0
                    targetStatus: FAILED
                    failedSourceCount: 1
        "400":
          $ref: "#/components/responses/ErrorResponse"

  /api/module-runs/{storage}/{id}/runs/{runId}:
    get:
      tags: [Unified Run History]
      summary: Детали конкретного запуска для общего экрана
      operationId: getModuleRunDetailsUnified
      parameters:
        - $ref: "#/components/parameters/StoragePath"
        - $ref: "#/components/parameters/ModuleIdPath"
        - $ref: "#/components/parameters/RunIdPath"
      responses:
        "200":
          description: Детали запуска
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ModuleRunDetailsResponse"
              example:
                run:
                  runId: "run-20260417-001"
                  moduleId: local-manual-test
                  moduleTitle: local-manual-test
                  status: RUNNING
                  startedAt: "2026-04-17T10:15:00Z"
                  finishedAt: null
                  requestedAt: "2026-04-17T10:15:00Z"
                  outputDir: "/Users/kwdev/DataPoolLoader/apps/local-manual-test/output"
                  mergedRowCount: 1700
                  targetStatus: RUNNING
                summaryJson: "{\n  \"mergeMode\": \"plain\"\n}"
                sourceResults:
                  - sourceName: db1
                    sortOrder: 0
                    status: SUCCESS
                    exportedRowCount: 1000
                    mergedRowCount: 1000
                  - sourceName: db2
                    sortOrder: 1
                    status: RUNNING
                    exportedRowCount: 700
                events:
                  - seqNo: 1
                    timestamp: "2026-04-17T10:15:00Z"
                    stage: RUN
                    eventType: RUN_CREATED
                    severity: INFO
                    message: "Запуск начат."
                  - seqNo: 2
                    timestamp: "2026-04-17T10:15:07Z"
                    stage: SOURCE
                    eventType: SOURCE_FINISHED
                    severity: SUCCESS
                    sourceName: db1
                    message: "Источник db1 завершен."
                artifacts:
                  - artifactKind: SUMMARY_JSON
                    artifactKey: summary
                    filePath: "/Users/kwdev/DataPoolLoader/apps/local-manual-test/output/summary.json"
                    storageStatus: PRESENT
        "400":
          $ref: "#/components/responses/ErrorResponse"

  /api/db/sync/state:
    get:
      tags: [DB Sync]
      summary: Текущее состояние импорта в DB registry
      operationId: getDbSyncState
      responses:
        "200":
          description: Состояние массового и точечного импорта
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ModuleSyncState"
              example:
                maintenanceMode: false
                message: "Массовый импорт модулей сейчас не выполняется."
                activeFullSync: null
                activeSingleSyncs:
                  - syncRunId: "sync-run-001"
                    scope: ONE
                    moduleCode: local-manual-test
                    startedAt: "2026-04-17T10:00:00Z"
                    startedByActorId: kwdev
                    startedByActorSource: OS_LOGIN
                    startedByActorDisplayName: kwdev

  /api/db/sync/runs:
    get:
      tags: [DB Sync]
      summary: История import-run `files -> database`
      operationId: listDbSyncRuns
      parameters:
        - $ref: "#/components/parameters/LimitQuery"
      responses:
        "200":
          description: Список запусков импорта
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ModuleSyncRunsResponse"
              example:
                runs:
                  - syncRunId: "sync-run-101"
                    scope: ALL
                    moduleCode: null
                    status: PARTIAL_SUCCESS
                    startedAt: "2026-04-17T10:00:00Z"
                    finishedAt: "2026-04-17T10:01:10Z"
                    startedByActorId: kwdev
                    startedByActorSource: OS_LOGIN
                    startedByActorDisplayName: kwdev
                    totalProcessed: 6
                    totalCreated: 2
                    totalUpdated: 0
                    totalSkipped: 3
                    totalFailed: 1
                  - syncRunId: "sync-run-100"
                    scope: ONE
                    moduleCode: local-manual-test
                    status: SUCCESS
                    startedAt: "2026-04-17T09:40:00Z"
                    finishedAt: "2026-04-17T09:40:09Z"
                    startedByActorId: kwdev
                    startedByActorSource: OS_LOGIN
                    startedByActorDisplayName: kwdev
                    totalProcessed: 1
                    totalCreated: 1
                    totalUpdated: 0
                    totalSkipped: 0
                    totalFailed: 0
        "400":
          $ref: "#/components/responses/ErrorResponse"

  /api/db/sync/runs/{syncRunId}:
    get:
      tags: [DB Sync]
      summary: Детали конкретного import-run
      operationId: getDbSyncRunDetails
      parameters:
        - name: syncRunId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Детали запуска импорта
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ModuleSyncRunDetails"
              example:
                run:
                  syncRunId: "sync-run-101"
                  scope: ALL
                  moduleCode: null
                  status: PARTIAL_SUCCESS
                  startedAt: "2026-04-17T10:00:00Z"
                  finishedAt: "2026-04-17T10:01:10Z"
                  startedByActorId: kwdev
                  startedByActorSource: OS_LOGIN
                  startedByActorDisplayName: kwdev
                  totalProcessed: 6
                  totalCreated: 2
                  totalUpdated: 0
                  totalSkipped: 3
                  totalFailed: 1
                items:
                  - moduleCode: local-manual-test
                    action: CREATED
                    status: SUCCESS
                    detectedHash: "sha256:..."
                    resultRevisionId: "11111111-1111-1111-1111-111111111111"
                    errorMessage: null
                    details:
                      reason: module_created
                  - moduleCode: db-conflict
                    action: SKIPPED_CODE_CONFLICT
                    status: WARNING
                    detectedHash: "sha256:..."
                    resultRevisionId: "22222222-2222-2222-2222-222222222222"
                    errorMessage: null
                    details:
                      reason: module_code_already_exists
                      message: "DB-модуль с таким кодом уже существует. Импорт не перезаписывает существующие модули."
        "400":
          $ref: "#/components/responses/ErrorResponse"

  /api/db/sync/one:
    post:
      tags: [DB Sync]
      summary: Импорт одного файлового модуля в registry
      operationId: syncOneModule
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SyncOneModuleRequest"
            example:
              moduleCode: local-manual-test
      responses:
        "200":
          description: Результат импорта одного модуля
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SyncRunResult"
              example:
                syncRunId: "sync-run-001"
                scope: SINGLE
                moduleCode: local-manual-test
                status: SUCCESS
                startedAt: "2026-04-17T10:00:00Z"
                finishedAt: "2026-04-17T10:00:03Z"
                totalProcessed: 1
                totalCreated: 0
                totalUpdated: 1
                totalSkipped: 0
                totalFailed: 0
                items:
                  - moduleCode: local-manual-test
                    action: UPDATE
                    status: SUCCESS
                    detectedHash: "sha256:example"
                    resultRevisionId: "rev-001"
                    details:
                      fingerprintMatch: false
                      changedFiles:
                        - "src/main/resources/application.yml"
        "400":
          $ref: "#/components/responses/ErrorResponse"

  /api/db/sync/all:
    post:
      tags: [DB Sync]
      summary: Массовый импорт всех файловых модулей в registry
      operationId: syncAllModules
      responses:
        "200":
          description: Результат массового импорта
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SyncRunResult"
              example:
                syncRunId: "sync-run-002"
                scope: FULL
                status: SUCCESS
                startedAt: "2026-04-17T11:00:00Z"
                finishedAt: "2026-04-17T11:00:12Z"
                totalProcessed: 12
                totalCreated: 2
                totalUpdated: 5
                totalSkipped: 5
                totalFailed: 0
                items: []
        "400":
          $ref: "#/components/responses/ErrorResponse"

  /api/db/modules/catalog:
    get:
      tags: [DB Modules]
      summary: Каталог DB-модулей
      operationId: getDbModulesCatalog
      parameters:
        - $ref: "#/components/parameters/IncludeHiddenQuery"
      responses:
        "200":
          description: Каталог DB-модулей
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DatabaseModulesCatalogResponse"
              example:
                runtimeContext:
                  requestedMode: database
                  effectiveMode: database
                  fallbackReason: null
                  actor:
                    resolved: true
                    actorId: kwdev
                    actorSource: OS_LOGIN
                    actorDisplayName: kwdev
                    requiresManualInput: false
                    message: "Пользователь ОС определен автоматически."
                  database:
                    configured: true
                    available: true
                    schema: ui_registry
                    message: "Подключение к базе данных доступно."
                modules:
                  - id: db-demo
                    title: "DB demo"
                    description: "Модуль в registry"
                    tags: ["registry", "demo"]
                    validationStatus: VALID
                    validationIssues: []
        "400":
          $ref: "#/components/responses/ErrorResponse"

  /api/db/modules/{id}:
    get:
      tags: [DB Modules]
      summary: Editor session DB-модуля
      operationId: getDbModuleSession
      parameters:
        - $ref: "#/components/parameters/ModuleIdPath"
      responses:
        "200":
          description: Данные DB-модуля для редактора
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ModuleEditorSessionResponse"
              example:
                storageMode: DATABASE
                module:
                  id: db-demo
                  title: "DB demo"
                  description: "Модуль в registry"
                  tags: ["registry", "demo"]
                  validationStatus: VALID
                  validationIssues: []
                  configPath: "database://db-demo/application.yml"
                  configText: "app:\n  outputDir: ./output\n  sources: []\n"
                  sqlFiles:
                    - label: "Общий SQL"
                      path: "classpath:sql/common.sql"
                      content: "select 1"
                      exists: true
                  requiresCredentials: false
                  credentialsStatus:
                    mode: NONE
                    displayName: "Файл не задан"
                    fileAvailable: false
                    uploaded: false
                  requiredCredentialKeys: []
                  missingCredentialKeys: []
                  credentialsReady: true
                capabilities:
                  save: false
                  saveWorkingCopy: true
                  discardWorkingCopy: true
                  publish: true
                  run: true
                  createModule: true
                  deleteModule: true
                sourceKind: WORKING_COPY
                currentRevisionId: "rev-001"
                workingCopyId: "draft-001"
                workingCopyStatus: DIRTY
                baseRevisionId: "rev-001"
        "400":
          $ref: "#/components/responses/ErrorResponse"
    delete:
      tags: [DB Modules]
      summary: Удаление DB-модуля
      operationId: deleteDbModule
      parameters:
        - $ref: "#/components/parameters/ModuleIdPath"
      responses:
        "200":
          description: Модуль удален
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DbModuleDeletedResponse"
              example:
                message: "Модуль 'db-demo' удалён из базы данных."
                moduleCode: db-demo
                deletedBy: kwdev
        "400":
          $ref: "#/components/responses/ErrorResponse"

  /api/db/modules/{id}/runs:
    get:
      tags: [DB Modules]
      summary: Краткая история запусков DB-модуля
      operationId: listDbModuleRuns
      parameters:
        - $ref: "#/components/parameters/ModuleIdPath"
      responses:
        "200":
          description: История запусков DB-модуля
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DatabaseModuleRunsResponse"
              example:
                moduleCode: db-demo
                runs:
                  - runId: "run-1"
                    executionSnapshotId: "snapshot-001"
                    status: SUCCESS
                    launchSourceKind: WORKING_COPY
                    requestedAt: "2026-04-17T10:14:58Z"
                    startedAt: "2026-04-17T10:15:00Z"
                    finishedAt: "2026-04-17T10:16:05Z"
                    moduleCode: db-demo
                    moduleTitle: "DB demo"
                    outputDir: "/tmp/db-run"
                    mergedRowCount: 1700
                    successfulSourceCount: 2
                    failedSourceCount: 0
                    skippedSourceCount: 0
                    targetStatus: SUCCESS
                    targetTableName: public.target_pool
                    targetRowsLoaded: 1700
        "400":
          $ref: "#/components/responses/ErrorResponse"

  /api/db/modules/{id}/runs/{runId}:
    get:
      tags: [DB Modules]
      summary: Детали запуска DB-модуля
      operationId: getDbModuleRunDetails
      parameters:
        - $ref: "#/components/parameters/ModuleIdPath"
        - $ref: "#/components/parameters/RunIdPath"
      responses:
        "200":
          description: Детали запуска DB-модуля
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DatabaseModuleRunDetailsResponse"
              example:
                run:
                  runId: "run-1"
                  executionSnapshotId: "snapshot-001"
                  status: SUCCESS
                  launchSourceKind: WORKING_COPY
                  requestedAt: "2026-04-17T10:14:58Z"
                  startedAt: "2026-04-17T10:15:00Z"
                  finishedAt: "2026-04-17T10:16:05Z"
                  moduleCode: db-demo
                  moduleTitle: "DB demo"
                  outputDir: "/tmp/db-run"
                  mergedRowCount: 1700
                  successfulSourceCount: 2
                  failedSourceCount: 0
                  skippedSourceCount: 0
                  targetStatus: SUCCESS
                  targetTableName: public.target_pool
