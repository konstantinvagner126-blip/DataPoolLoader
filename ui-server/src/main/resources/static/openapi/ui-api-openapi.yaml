components:
  parameters:
    ModuleIdPath:
      name: id
      in: path
      required: true
      description: Код или идентификатор модуля.
      schema:
        type: string
      example: local-manual-test
    StoragePath:
      name: storage
      in: path
      required: true
      description: Режим хранения модуля для общего экрана истории.
      schema:
        type: string
        enum: [files, database]
      example: files
    RunIdPath:
      name: runId
      in: path
      required: true
      schema:
        type: string
      example: run-1
    AsyncQueryIdPath:
      name: id
      in: path
      required: true
      schema:
        type: string
        format: uuid
      example: 397c4e99-602b-432d-9b39-37a28c42ba5e
    IncludeHiddenQuery:
      name: includeHidden
      in: query
      required: false
      description: Показывать скрытые DB-модули.
      schema:
        type: boolean
      example: true
    LimitQuery:
      name: limit
      in: query
      required: false
      description: Глубина истории запусков.
      schema:
        type: integer
        minimum: 1
        maximum: 200
        default: 20
      example: 50

  responses:
    ErrorResponse:
      description: Ошибка уровня запроса
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
          example:
            error: "Режим базы данных сейчас недоступен."

  schemas:
    ErrorResponse:
      type: object
      required: [error]
      properties:
        error:
          type: string

    FreeformObject:
      type: object
      additionalProperties: true

    StringMap:
      type: object
      additionalProperties:
        type: string

    NullableStringMap:
      type: object
      additionalProperties:
        type: [string, "null"]

    LongMap:
      type: object
      additionalProperties:
        type: integer
        format: int64

    UiRuntimeModeUpdateRequest:
      type: object
      required: [mode]
      properties:
        mode:
          type: string
          enum: [files, database]

    UiRuntimeModeUpdateResponse:
      type: object
      required: [message, runtimeContext]
      properties:
        message:
          type: string
        runtimeContext:
          $ref: "#/components/schemas/UiRuntimeContext"

