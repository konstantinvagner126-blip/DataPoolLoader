ui:
  port: 8080
  appsRoot: __APPS_ROOT__
  storageDir: storage
  moduleStore:
    mode: files
    postgres:
      jdbcUrl: null
      username: null
      password: null
      schema: ui_registry
  showTechnicalDiagnostics: false
  showRawSummaryJson: false
  defaultCredentialsFile: credential.properties
  sqlConsole:
    fetchSize: 1000
    maxRowsPerShard: 200
    queryTimeoutSec: 60
    sourceGroups:
      - name: dev
        sourceNames: [db1, db2]
      - name: ift
        sourceNames: [db2, db3, db4]
      - name: lt
        sourceNames: [db4, db5]
    sources:
      - name: db1
        jdbcUrl: ${LOCAL_MANUAL_DB_JDBC_URL}
        username: ${LOCAL_MANUAL_DB_USERNAME}
        password: ${LOCAL_MANUAL_DB_PASSWORD}
      - name: db2
        jdbcUrl: ${LOCAL_MANUAL_DB_JDBC_URL}
        username: ${LOCAL_MANUAL_DB_USERNAME}
        password: ${LOCAL_MANUAL_DB_PASSWORD}
      - name: db3
        jdbcUrl: ${LOCAL_MANUAL_DB_JDBC_URL}
        username: ${LOCAL_MANUAL_DB_USERNAME}
        password: ${LOCAL_MANUAL_DB_PASSWORD}
      - name: db4
        jdbcUrl: ${LOCAL_MANUAL_DB_JDBC_URL}
        username: ${LOCAL_MANUAL_DB_USERNAME}
        password: ${LOCAL_MANUAL_DB_PASSWORD}
      - name: db5
        jdbcUrl: ${LOCAL_MANUAL_DB_JDBC_URL}
        username: ${LOCAL_MANUAL_DB_USERNAME}
        password: ${LOCAL_MANUAL_DB_PASSWORD}
